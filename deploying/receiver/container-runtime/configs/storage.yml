version: 1.0.0

keystores:
  - name: server
    type: pem
    certificate:
      - label: cert
        content: "@keys/server.pem"
    key:
      - label: key
        content: "@keys/server.key"
  - name: rt_profile_keys
    type: pem
    certificate:
      - label: pgsql_ca
        content: "@keys/pgsql_ca.pem"
      - label: kafka_ca
        content: "@keys/kafka_ca.pem"

server_connections:
  - name: pgsql
    type: postgresql
    database_name: antenna
    hosts:
      - hostname: antenna-postgres
        hostport: 5432
    credential:
      username: "@secrets/pgsql_user"
      password: "@secrets/pgsql_password"
    conn_settings:
      min_pool_size: 5
      max_pool_size: 50
      max_idle_time: 10
      connect_timeout: 5
      aged_timeout: 30
    ssl:
      certificate:
        - ks:rt_profile_keys/pgsql_ca
  - name: kafka
    type: kafka
    hosts:
      - hostname: antenna-kafka
        hostport: 9092
    ssl:
      certificate:
        - ks:rt_profile_keys/kafka_ca
    credential:
      sasl:
        mechanism: PLAIN
        username: "@secrets/kafka_user"
        password: "@secrets/kafka_password"

databases:
  config:
    server: pgsql
  ssf_2_action:
    server: kafka
    partitions: 10